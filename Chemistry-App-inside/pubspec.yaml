name: chemistry_app
description: "An interactive organic chemistry learning app for beginners."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.7

  # State Management
  provider: ^6.1.4

  # Google Fonts
  google_fonts: ^6.2.1

  # AI - Google Gemini (free tier via AI Studio)
  dart_openai: ^5.1.0
  
  # HTTP client for PubChem REST API
  http: ^1.2.2

  flutter_dotenv: ^5.1.0
  flutter_typeahead: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
