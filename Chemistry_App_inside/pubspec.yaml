name: chemistry_app
description: "An interactive organic chemistry learning app for beginners."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.9.0
  cloud_firestore: ^6.4.1

  # State Management
  provider: ^6.1.4

  # Google Fonts
  google_fonts: ^8.1.0

  # AI - Google Gemini (free tier via AI Studio)
  dart_openai: ^6.1.1
  
  # HTTP client for PubChem REST API
  http: ^1.2.2

  flutter_dotenv: ^6.0.1
  flutter_typeahead: ^6.0.0
  shared_preferences: ^2.5.2

  # Text-to-Speech for AI responses
  flutter_tts: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - .env
    - assets/data/
